name: Publish
on:
  workflow_dispatch:

jobs:
  release-and-publish:
    name: Release and Publish
    runs-on: macOS-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Fetch all history to ensure tags can be checked properly
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep "versionName =" gradle/libs.versions.toml | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.get_version.outputs.VERSION }}$"; then
            echo "Tag v${{ steps.get_version.outputs.VERSION }} already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v${{ steps.get_version.outputs.VERSION }} does not exist. Proceeding with release."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build XCFramework
        if: steps.check_tag.outputs.exists == 'false'
        run: ./gradlew :openlocationcode:assembleOpenLocationCodeReleaseXCFramework --no-configuration-cache

      - name: Zip and Checksum XCFramework
        if: steps.check_tag.outputs.exists == 'false'
        id: xcframework
        run: |
          cd openlocationcode/build/XCFrameworks/release
          zip -r OpenLocationCode.xcframework.zip OpenLocationCode.xcframework
          CHECKSUM=$(shasum -a 256 OpenLocationCode.xcframework.zip | awk '{ print $1 }')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          mv OpenLocationCode.xcframework.zip $GITHUB_WORKSPACE/

      - name: Update Package.swift and Commit
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          CHECKSUM="${{ steps.xcframework.outputs.CHECKSUM }}"
          
          # Replace version in URL
          sed -i '' -E "s/download\/v[^\/]+\/OpenLocationCode\.xcframework\.zip/download\/v$VERSION\/OpenLocationCode.xcframework.zip/" Package.swift
          # Replace checksum
          sed -i '' -E "s/checksum: \"[^\"]+\"/checksum: \"$CHECKSUM\"/" Package.swift
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          
          # Only commit and push if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: Update Package.swift checksum for v$VERSION [skip ci]"
            git push origin main
          fi

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: OpenLocationCode.xcframework.zip
          target_commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync back to Develop
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          # Checkout develop
          git fetch origin develop:develop
          git checkout develop
          
          # Create a sync branch
          git checkout -b sync-main-to-develop-v$VERSION
          
          # Merge main into it
          git merge main -m "Merge main into sync branch for v$VERSION"
          git push origin sync-main-to-develop-v$VERSION
          
          # Create PR
          gh pr create \
            --title "chore: sync main to develop after v$VERSION release" \
            --body "This PR syncs the automated \`Package.swift\` checksum update back into the develop branch after a release." \
            --base develop \
            --head sync-main-to-develop-v$VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to MavenCentral
        if: steps.check_tag.outputs.exists == 'false'
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
